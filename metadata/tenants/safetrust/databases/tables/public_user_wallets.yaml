table:
  name: user_wallets
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
select_permissions:
  - role: landlord
    permission:
      columns:
        - id
        - user_id
        - wallet_address
        - chain_type
        - is_primary
        - created_at
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      comment: "Landlords can only see their own wallets"
  - role: tenant
    permission:
      columns:
        - id
        - user_id
        - wallet_address
        - chain_type
        - is_primary
        - created_at
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      comment: "Tenants can only see their own wallets"
insert_permissions:
  - role: landlord
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - wallet_address
        - chain_type
        - is_primary
      set:
        user_id: X-Hasura-User-Id
        created_at: "now()"
      comment: "Landlords can add their own wallets"
  - role: tenant
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - wallet_address
        - chain_type
        - is_primary
      set:
        user_id: X-Hasura-User-Id
        created_at: "now()"
      comment: "Tenants can add their own wallets"
update_permissions:
  - role: landlord
    permission:
      columns:
        - is_primary
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
      comment: "Landlords can update their own wallet settings"
  - role: tenant
    permission:
      columns:
        - is_primary
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
      comment: "Tenants can update their own wallet settings"
delete_permissions:
  - role: landlord
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      comment: "Landlords can delete their own wallets"
  - role: tenant
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      comment: "Tenants can delete their own wallets"
