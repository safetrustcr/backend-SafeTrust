table:
  name: escrow_pending_approvals
  schema: public
object_relationships:
  - name: escrow
    using:
      foreign_key_constraint_on: escrow_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - escrow_id
        - field_changed
        - old_value
        - new_value
        - changed_by_role
        - requires_customer_approval
        - customer_approved
        - customer_approved_at
        - customer_wallet_address
        - unsigned_xdr
        - signed_xdr
        - status
        - expires_at
        - created_at
        - tenant_id
      filter:
        _and:
          - tenant_id:
              _eq: X-Hasura-Tenant-Id
          - customer_wallet_address:
              _eq: X-Hasura-Wallet-Address
      comment: "Users can only view approvals for their own wallet address within their tenant"
  - role: admin
    permission:
      columns:
        - id
        - escrow_id
        - field_changed
        - old_value
        - new_value
        - changed_by_role
        - changed_by_user_id
        - requires_customer_approval
        - customer_approved
        - customer_approved_at
        - customer_wallet_address
        - unsigned_xdr
        - signed_xdr
        - status
        - expires_at
        - created_at
        - tenant_id
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      comment: "Admins can view all pending approvals within their tenant"
  - role: superadmin
    permission:
      columns:
        - id
        - escrow_id
        - field_changed
        - old_value
        - new_value
        - changed_by_role
        - changed_by_user_id
        - requires_customer_approval
        - customer_approved
        - customer_approved_at
        - customer_wallet_address
        - unsigned_xdr
        - signed_xdr
        - status
        - expires_at
        - created_at
        - tenant_id
      filter: {}
      comment: "Superadmins can view all pending approvals across all tenants"
insert_permissions:
  - role: admin
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - escrow_id
        - field_changed
        - old_value
        - new_value
        - changed_by_role
        - changed_by_user_id
        - requires_customer_approval
        - customer_wallet_address
        - unsigned_xdr
        - status
        - expires_at
      set:
        tenant_id: X-Hasura-Tenant-Id
        created_at: now
      comment: "Admins can create pending approval records within their tenant"
  - role: superadmin
    permission:
      check: {}
      columns:
        - escrow_id
        - field_changed
        - old_value
        - new_value
        - changed_by_role
        - changed_by_user_id
        - requires_customer_approval
        - customer_wallet_address
        - unsigned_xdr
        - status
        - expires_at
        - tenant_id
      set:
        created_at: now
      comment: "Superadmins can create pending approval records across all tenants"
update_permissions:
  - role: user
    permission:
      columns:
        - customer_approved
        - customer_approved_at
        - signed_xdr
        - status
      filter:
        _and:
          - tenant_id:
              _eq: X-Hasura-Tenant-Id
          - customer_wallet_address:
              _eq: X-Hasura-Wallet-Address
          - status:
              _eq: pending_approval
      check:
        _and:
          - tenant_id:
              _eq: X-Hasura-Tenant-Id
          - customer_wallet_address:
              _eq: X-Hasura-Wallet-Address
          - status:
              _in: [approved, rejected]
      set:
        customer_approved_at: now
      comment: "Users can approve/reject pending changes for their own wallet by updating signed_xdr and status"
  - role: admin
    permission:
      columns:
        - field_changed
        - old_value
        - new_value
        - changed_by_role
        - changed_by_user_id
        - requires_customer_approval
        - customer_approved
        - customer_approved_at
        - customer_wallet_address
        - unsigned_xdr
        - signed_xdr
        - status
        - expires_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      comment: "Admins can update pending approval records within their tenant"
  - role: superadmin
    permission:
      columns:
        - field_changed
        - old_value
        - new_value
        - changed_by_role
        - changed_by_user_id
        - requires_customer_approval
        - customer_approved
        - customer_approved_at
        - customer_wallet_address
        - unsigned_xdr
        - signed_xdr
        - status
        - expires_at
        - tenant_id
      filter: {}
      check: {}
      comment: "Superadmins can update pending approval records across all tenants"
event_triggers:
  - name: on_escrow_approval_required
    definition:
      enable_manual: false
      insert:
        columns: "*"
    retry_conf:
      num_retries: 3
      interval_sec: 10
      timeout_sec: 60
    webhook: "{{WEBHOOK_BASE_URL}}/webhooks/escrow/approval-required"
    headers:
      - name: x-webhook-secret
        value_from_env: WEBHOOK_SECRET
