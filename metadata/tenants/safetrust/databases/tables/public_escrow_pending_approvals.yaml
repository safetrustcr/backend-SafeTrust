table:
  name: escrow_pending_approvals
  schema: public
configuration:
  column_config:
    escrow_id:
      custom_name: escrowId
    field_changed:
      custom_name: fieldChanged
    old_value:
      custom_name: oldValue
    new_value:
      custom_name: newValue
    changed_by_role:
      custom_name: changedByRole
    changed_by_user_id:
      custom_name: changedByUserId
    requires_customer_approval:
      custom_name: requiresCustomerApproval
    customer_approved:
      custom_name: customerApproved
    customer_approved_at:
      custom_name: customerApprovedAt
    customer_wallet_address:
      custom_name: customerWalletAddress
    unsigned_xdr:
      custom_name: unsignedXdr
    signed_xdr:
      custom_name: signedXdr
    expires_at:
      custom_name: expiresAt
    created_at:
      custom_name: createdAt
    tenant_id:
      custom_name: tenantId
  custom_name: escrowPendingApprovals
object_relationships:
  - name: escrow
    using:
      foreign_key_constraint_on: escrow_id
array_relationships:
  - name: matching_wallets
    using:
      manual_configuration:
        remote_table:
          name: user_wallets
          schema: public
        column_mapping:
          customer_wallet_address: wallet_address
      comment: "Relationship to user_wallets to filter by user's wallet addresses"
select_permissions:
  - role: anonymous
    permission:
      columns: []
      filter: {}
    comment: "Anonymous users cannot access escrow pending approvals"
  - role: user
    permission:
      columns:
        - id
        - escrow_id
        - field_changed
        - old_value
        - new_value
        - changed_by_role
        - requires_customer_approval
        - customer_approved
        - customer_approved_at
        - customer_wallet_address
        - unsigned_xdr
        - signed_xdr
        - status
        - expires_at
        - created_at
        - tenant_id
      filter:
        _and:
          - tenant_id:
              _eq: X-Hasura-Tenant-Id
          - matching_wallets:
              user_id:
                _eq: X-Hasura-User-Id
      comment: "Users can see pending approvals for their wallet addresses in their tenant"
  - role: admin
    permission:
      columns: "*"
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      comment: "Admins can view all pending approvals in their tenant"
  - role: superadmin
    permission:
      columns: "*"
      filter: {}
      comment: "Superadmins can view all pending approvals across all tenants"
insert_permissions:
  - role: admin
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      columns:
        - escrow_id
        - field_changed
        - old_value
        - new_value
        - changed_by_role
        - changed_by_user_id
        - requires_customer_approval
        - customer_wallet_address
        - unsigned_xdr
        - status
        - expires_at
      set:
        tenant_id: X-Hasura-Tenant-Id
      comment: "Admins can create pending approval records in their tenant"
  - role: superadmin
    permission:
      check: {}
      columns:
        - escrow_id
        - field_changed
        - old_value
        - new_value
        - changed_by_role
        - changed_by_user_id
        - requires_customer_approval
        - customer_wallet_address
        - unsigned_xdr
        - status
        - expires_at
        - tenant_id
      comment: "Superadmins can create pending approval records across all tenants"
update_permissions:
  - role: user
    permission:
      columns:
        - customer_approved
        - signed_xdr
        - customer_approved_at
        - status
      filter:
        _and:
          - tenant_id:
              _eq: X-Hasura-Tenant-Id
          - matching_wallets:
              user_id:
                _eq: X-Hasura-User-Id
          - status:
              _eq: "pending_approval"
      check:
        _and:
          - tenant_id:
              _eq: X-Hasura-Tenant-Id
          - matching_wallets:
              user_id:
                _eq: X-Hasura-User-Id
      comment: "Users can approve pending changes by updating signed_xdr and status for their wallet addresses"
  - role: admin
    permission:
      columns:
        - unsigned_xdr
        - signed_xdr
        - status
        - customer_approved
        - customer_approved_at
        - expires_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      check:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      comment: "Admins can update pending approval records in their tenant"
  - role: superadmin
    permission:
      columns: "*"
      filter: {}
      check: {}
      comment: "Superadmins can update any pending approval record"
delete_permissions:
  - role: admin
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
      comment: "Admins can delete pending approval records in their tenant"
  - role: superadmin
    permission:
      filter: {}
      comment: "Superadmins can delete any pending approval record"
