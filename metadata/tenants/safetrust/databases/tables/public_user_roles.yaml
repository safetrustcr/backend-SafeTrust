table:
  name: user_roles
  schema: public
configuration:
  column_config: {}
  custom_column_names: {}
  custom_name: user_roles
  custom_root_fields: {}
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
  - name: role
    using:
      foreign_key_constraint_on: role_id
select_permissions:
  - role: admin
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true
  - role: host
    permission:
      columns:
        - id
        - user_id
        - role_id
        - created_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
  - role: guest
    permission:
      columns:
        - id
        - user_id
        - role_id
        - created_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
