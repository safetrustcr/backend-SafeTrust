table:
  name: users
  schema: public

columns:
  - name: firebase_uid
    type: text
    is_nullable: true

  - name: id
    type: uuid
    default: "uuid_generate_v4()"
    is_nullable: false
    is_primary_key: true

  - name: email
    type: varchar(150)
    is_nullable: false

  - name: first_name
    type: varchar(50)
    is_nullable: true

  - name: last_name
    type: varchar(50)
    is_nullable: true

  - name: phone_number
    type: varchar(15)
    is_nullable: true

  - name: role
    type: varchar(20)
    default: "'GUEST'::character varying"
    is_nullable: false

  - name: hotel_id
    type: uuid
    is_nullable: true

  - name: created_at
    type: timestamp with time zone
    default: "now()"
    is_nullable: false

  - name: updated_at
    type: timestamp with time zone
    default: "now()"
    is_nullable: false

constraints:
  - name: users_email_unique
    type: unique
    columns:
      - email

indexes:
  - name: idx_users_email
    columns:
      - email
  - name: idx_users_hotel_id
    columns:
      - hotel_id
  - name: idx_users_role
    columns:
      - role
  - name: idx_users_firebase_uid
    columns:
      - firebase_uid

select_permissions:
  - role: user
    permission:
      columns:
        - id
        - firebase_uid
        - email
        - first_name
        - last_name
        - phone_number
        - role
        - hotel_id
        - created_at
        - updated_at
      filter: {}

insert_permissions:
  - role: admin
    permission:
      check: {}
      columns:
        - firebase_uid
        - email
        - first_name
        - last_name
        - phone_number
        - role
        - hotel_id
        - created_at
        - updated_at

update_permissions:
  - role: admin
    permission:
      filter: {}
      columns:
        - firebase_uid
        - email
        - first_name
        - last_name
        - phone_number
        - role
        - hotel_id
        - created_at
        - updated_at

delete_permissions:
  - role: admin
    permission:
      filter: {}
